version: '3.8'
services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: always
    environment:
      - TELEGRAM_API_ID=${API_ID}
      - TELEGRAM_API_HASH=${API_HASH}
      - TELEGRAM_LOCAL=1
    volumes:
      - ./telegram-api-data:/var/lib/telegram-bot-api

  tg-sender:
    build: .
    restart: always
    depends_on:
      - telegram-bot-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./public/uploads:/app/public/uploads
      - ./public/fonts:/app/public/fonts
